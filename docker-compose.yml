services:
  nginx-monitor:
    build: .
    container_name: nginx-monitor
    restart: unless-stopped
    user: "33:33"  # www-data para poder leer logs de nginx
    group_add:
      - "4"  # grupo adm para leer logs de fail2ban
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./data:/data
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log/fail2ban.log:/var/log/fail2ban.log:ro
      - /var/log/ufw.log:/var/log/ufw.log:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - /etc/fail2ban/ip.blacklist:/etc/fail2ban/ip.blacklist:ro
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-change-me-in-production}
      - DATABASE_URL=postgresql+psycopg://monitor:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/monitor
      - MONITOR_SITES=${MONITOR_SITES:-}
      - MONITOR_APPS=${MONITOR_APPS:-}
      - MONITOR_LOG_MAP=${MONITOR_LOG_MAP:-}
      - MONITOR_SITE_APP=${MONITOR_SITE_APP:-}
      - MONITOR_SSH_PORTS=${MONITOR_SSH_PORTS:-}
      - MONITOR_VPN_PORTS=${MONITOR_VPN_PORTS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:18-alpine
    container_name: nginx-monitor-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=monitor
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-in-production}
      - POSTGRES_DB=monitor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
